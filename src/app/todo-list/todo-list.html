<div class="todo-container">
  <h2>To Do List</h2>

  <input type="text" [(ngModel)]="newTask" placeholder="Enter new Task" (keyup.enter)="addTask()" />
  <button class="add" (click)="addTask()">Add</button>
  <!-- Deprecated NgIf & ngFor, Now should use @if and @for-->
  <!-- <p *ngIf="tasks.length === 0">No tasks available. Add a new task!</p>

  <ul>
    <li *ngFor="let task of tasks; let i = index">
      {{ task }}
      <button class="remove" (click)="removeTask(i)">Remove Task</button>
    </li>
  </ul> -->

  @if (tasks.length === 0) {
    <p>No tasks available. Add a new task!</p>
  } @else {
    <h2>Tasks</h2>
    <ul>
      @for (item of tasks; track $index; let i = $index) {
        <li>
          {{ item }}
          <button (click)="removeTask(i)">Remove Task</button>
        </li>
      }
    </ul>
  }
</div>
